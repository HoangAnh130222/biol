<script type="text/javascript" var_1="true" var_2="false" var_3="false" var_4="80" src="https://static1.fshare.vn/js/flies-obj-2.1.js?v=f596f1d8"></script>
<!-- Hết ruồi -->
   <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lexend', sans-serif;
            /* CHÈN LINK GIF MÀU CAM CỦA BẠN VÀO ĐÂY */
            background: url('https://usagif.com/wp-content/uploads/gif/anime-sleep-31.gif') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* BẢNG TRONG SUỐT TÔNG CAM NHẠT */
        .bio-card {
            background: rgba(255, 245, 230, 0.25); /* Trắng kem hơi hướng cam */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 40px 25px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(230, 126, 34, 0.3);
        }

        .avatar-top {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 4px solid #fff;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        /* CHỮ TRẮNG VIỀN CAM CHÁY - CỰC RÕ TRÊN NỀN CAM SÁNG */
        .title {
            color: #ffffff;
            font-size: 30px;
            font-weight: 900;
            margin-bottom: 8px;
            text-transform: uppercase;
            /* Viền màu Cam Cháy (Burnt Orange) để nổi bật trên nền cam sáng */
            -webkit-text-stroke: 1.8px #D35400; 
            text-shadow: 3px 3px 0px #D35400, 5px 5px 15px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }

        .subtitle {
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 35px;
            -webkit-text-stroke: 0.6px #D35400;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        /* NÚT BẤM TÔNG CAM SANG TRỌNG */
        .link-button {
            display: block;
            background: #ffffff;
            color: #E67E22; /* Màu Cam Carrot sang trọng */
            text-decoration: none;
            margin: 15px 0;
            padding: 16px;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 800;
            border: 2.5px solid #E67E22;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        /* Hiệu ứng khi bấm */
        .link-button:active, .link-button:hover {
            background: #E67E22;
            color: #ffffff;
            transform: scale(1.06);
            box-shadow: 0 8px 20px rgba(230, 126, 34, 0.4);
        }

        .social-icons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 50px;
        }

        .social-icons a img {
            width: 30px;
            height: 30px;
            /* Đổ bóng cho icon để không bị chìm vào nền cam */
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
            transition: 0.2s;
        }

        .social-icons a:active img {
            transform: scale(1.3);
        }
    </style>
</head>
<body>

    <div class="bio-card">
        <div class="avatar-top">
            <img src="https://hinhnenonline.com/wp-content/uploads/2025/01/hutao-gif%E2%80%8B-2.gif" alt="Avatar" style="width:100%; height:100%; object-fit:cover;">
        </div>

        <div class="title">MATCHA LATTE</div>
