<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Matcha Latte</title>
<link rel="stylesheet" href="webmeji.css">

   <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lexend', sans-serif;
            /* CHÈN LINK GIF MÀU CAM CỦA BẠN VÀO ĐÂY */
            background: url('https://i.pinimg.com/736x/b8/28/93/b828935c41b0d8a3342bb0c8347b64e0.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* BẢNG TRONG SUỐT TÔNG CAM NHẠT */
    .bio-card {
    background: transparent;
    border: none;
    box-shadow: none;
    width: 90%;
    max-width: 320px;
    text-align: center;
    /* Thêm transition ở đây để các thay đổi bên trong mượt hơn */
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
/* Làm cho cụm icon mạng xã hội cũng trong suốt theo */
.social-icons {
    background: rgba(255, 255, 255, 0.05) !important;
    border: 1px solid rgba(255, 255, 255, 0.1);
}
       .avatar-top {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin: 0 auto 20px;
    /* Làm viền mờ đi hoặc xóa hẳn */
    border: 2px solid rgba(255, 255, 255, 0.3); 
    overflow: hidden;
    /* Xóa đổ bóng đen để không bị đục */
    box-shadow: none; 
    /* Giúp hiệu ứng hiển thị mượt mà trên điện thoại */
    background: transparent;
}

.avatar-top img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* Nếu bạn muốn chính tấm ảnh đại diện cũng hơi trong suốt */
    opacity: 0.9; 
}
.title {
    color: #f01027;
    font-size: 28px;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0px #d3bc8e, 4px 4px 10px rgba(0,0,0,0.2);
    -webkit-text-stroke: 0.5px #d3bc8e;
}

.subtitle {
    background: #ddcdcd; /* Nền vàng cho chữ BIO */
    color: #da1553;
    padding: 2px 15px;
    border-radius: 20px;
    display: inline-block;
    font-size: 15px;
    margin-bottom: 25px;
}
 .link-button {
    display: block;
    color: #5d4637; 
    text-decoration: none;
    margin: 15px 0;
    padding: 14px 25px;
    /* Bo tròn tối đa để tạo hình con nhộng cực đẹp */
    border-radius: 50px; 
    font-size: 16px;
    font-weight: 800;
    position: relative;
    z-index: 1;
    overflow: hidden; 
    border: none;
    text-transform: uppercase;
    transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

/* HIỆU ỨNG 1 SỢI MÀU CHẠY ĐUỔI NHAU */
.link-button::before {
    content: '';
    position: absolute;
    /* Làm vùng xoay thật lớn để sợi màu chạy mượt quanh đường cong */
    top: -150%; 
    left: -25%;
    width: 150%;
    height: 400%;
    /* 1 sợi màu Pastel duy nhất chiếm 15% vòng tròn */
    background: conic-gradient(
        from 0deg,
        #FFB6C1, #FFD700, #98FB98, #87CEFA, #DDA0DD, #FFB6C1,
        transparent 15% 
    );
    animation: rotate-single 2.5s linear infinite;
    z-index: -2;
}

/* LỚP NỀN Ô CHỌN (Bo tròn khớp với khung ngoài) */
.link-button::after {
    content: '';
    position: absolute;
    inset: 3px; /* Độ dày của sợi màu */
    background: #f3f0f2;
    border-radius: 50px; /* Phải trùng với border-radius ở trên */
    z-index: -1;
    transition: all 0.3s ease;
}

/* HIỆU ỨNG CHẠM DỊU MẮT */
.link-button:hover, .link-button:active {
    transform: scale(1.05);
    color: #FF69B4;
}

.link-button:active::after {
    /* Hiệu ứng loang màu nhẹ nhàng khi chạm, không bị chói */
    background: linear-gradient(45deg, #FFF5F7, #FFF9E6, #F0F8FF);
    filter: brightness(0.98);
}

/* ANIMATION */
@keyframes rotate-single {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

        .social-icons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 50px;
        }

        .social-icons a img {
            width: 30px;
            height: 30px;
            /* Đổ bóng cho icon để không bị chìm vào nền cam */
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
            transition: 0.2s;
        }

        .social-icons a:active img {
            transform: scale(1.3);
        }
    </style>
</head>
